# ─── Application ──────────────────────────────────────────────
spring.application.name=campustrack-backend
server.port=8080

# ─── MySQL Database (production) ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/campustrack_db?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Deepu@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────
# Change this secret in production (min 32 chars)
app.jwt.secret=campustrack-super-secret-key-for-jwt-2024-production-change-me
app.jwt.expiration-ms=86400000

# ─── CORS origins (comma-separated) ──────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.campustrack=DEBUG
logging.level.org.springframework.security=WARN
