spring.application.name=campustrack-backend
server.port=${PORT:8080}

# ─── MySQL Database (local development) ───────────────────────
spring.datasource.url=${MY_DB_URL:jdbc:postgresql://dpg-d79vpjlm5p6s73eua760-a.oregon-postgres.render.com:5432/campustrack_db?sslmode=require}
spring.datasource.username=${MY_DB_USER:campustrack_db_user}
spring.datasource.password=${MY_DB_PASS:ozRG2bGuChLkmYKKE1pBoAp0YnsR1gou}
spring.datasource.driver-class-name=${MY_DB_DRIVER:org.postgresql.Driver}

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Use PostgreSQL dialect if the URL contains postgresql
spring.jpa.database-platform=${MY_DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${MY_JWT:campustrack_super_secure_secret_key_1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── CORS origins (comma-separated) ──────────────────────────
app.cors.allowed-origins=${MY_CORS:https://campus-track-system-ritc.vercel.app,http://localhost:3000,http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────
