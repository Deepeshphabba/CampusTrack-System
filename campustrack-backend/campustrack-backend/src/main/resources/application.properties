# ─── Application ──────────────────────────────────────────────
spring.application.name=campustrack-backend
server.port=8080

# ─── MySQL Database (local development) ───────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campustrack_db?serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Deepu@123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Use PostgreSQL dialect if the URL contains postgresql
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:campustrack-super-secret-key-for-jwt-2024-production-change-me}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── CORS origins (comma-separated) ──────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.campustrack=${LOGGING_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN
